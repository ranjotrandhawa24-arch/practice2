<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        td,
        th {
            padding: 15px;
            border: 1px solid rgb(216, 36, 36);
        }
    </style>
    <link rel="stylesheet" href="style1.css" />
</head>

<body>
    <table border="black" width="300" height="50">
        <tr>
            <th colspan="3">large header </th>

        </tr>
        <tr>
            <td> cell 1</td>
            <td> cell2</td>
            <td> cell3 </td>
        </tr>
        <tr>
            <td colspan="2" height="70"> cell4</td>
            <td> cell5 </td>
        </tr>
        <tr>
            <td width="40" rowspan="2"> cell6 </td>
        
    </table>

</body>

</html>
